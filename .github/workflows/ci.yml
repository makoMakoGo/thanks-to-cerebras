name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x
      - name: deno fmt --check
        run: deno task fmt:check
      - name: deno lint
        run: deno task lint
      - name: naming check
        run: deno task naming:check
      - name: complexity check
        run: deno task complexity:check
      - name: module boundary check
        run: deno task module-boundaries:check
      - name: AGENTS instructions check
        run: deno task agents:check
      - name: large file check
        run: deno task large-files:check
      - name: tech debt check
        run: deno task tech-debt:check
      - name: duplicate code check
        run: deno task duplicate-code:check
      - name: unused dependency check
        run: deno task unused-deps:check
      - name: OpenAPI schema check
        run: deno task openapi:check
      - name: deno check
        run: deno task check
      - name: deno test with coverage
        run: deno task test:ci
      - name: coverage threshold
        run: |
          deno task coverage:lcov
          deno task coverage:check
      - name: test performance report
        run: deno task test:performance
      - name: flaky test check
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: deno task test:flaky
      - name: upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/junit.xml
            coverage/coverage.lcov
      - name: dast check
        env:
          KEY_ENCRYPTION_SECRET: ci-dast-key-encryption-secret
          SETUP_TOKEN: ci-dast-setup-token
          KV_PATH: ${{ runner.temp }}/dast-kv
          PORT: "8339"
        run: |
          deno task start &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8339/readyz >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Server did not become ready" >&2
              exit 1
            fi
            sleep 1
          done
          deno task dast:check
